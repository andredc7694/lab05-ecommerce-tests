name: CI - Pruebas Unitarias y Cobertura

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: pip install pytest pytest-cov
      - name: Ejecutar pruebas y validar cobertura 80%
        run: python -m pytest --cov=ecommerce --cov-report=term-missing --cov-fail-under=80 -v